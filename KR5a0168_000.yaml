body:
  text: 梁貞白先生陶弘景纂唐天台妙有大師玄同先生賜紫閭丘方逺校定玉清三元宫上第一中位丄合虛皇道君應號元始天尊左位五靈七明混生髙上道君東明髙上虛皇道君西華髙上虛皇道君北玄髙上虛皇道君南朱髙上虛皇道君玉清上元宫四道君各有諱字玉清中元宫紫清六道君各有諱字玉清下元宫髙清四元君各有諱字玉清中散位一十君諱字不顯右位紫虛髙上元皇道君洞虛三元太明上皇道君太素髙虛上極紫皇道君虛明紫蘭中元髙上嵉皇道君三元上玄老虛皇元晨君三元四極上元虛皇元靈君三元晨中黃景虛皇元臺君三元紫映揮神虛生主真元胎君玉玄太皇君上皇道君玉皇道君清玄道君上皇天帝玉天太一君太上虛皇道君太上玉真保皇道君玄皇髙真太一玉君髙上玉帝右玉清境元始天尊為主巳下道君皆得策命學道號令羣真太微天帝來受事並不與下界相關自九宫巳上上清巳下髙真仙官皆得朝宴焉第二中位上清髙聖太上玉晨玄皇大道君為萬道之主左位左聖紫晨太微天帝道君左聖南極南嶽真人左仙公太虛真人赤松子黃老君弟子裴君師左輔後聖上宰西域西極真人總真君姓王諱逺字方平紫陽君弟子司命茅君師紫清太素髙虛洞曜道君太虛上霄飛晨中央道君赤松太微東霞扶桑丹林大帝上道君後聖太師太微左真保皇道君紫明太微九道髙元玉晨道君紫元太微八素三元玄晨道君九微太真玉保王金闕上相大司命髙晨師東海王青華小童君領九宫上相長里先生薛君周時得道許長史前緑兄也太微右真公領九宫上相希林真人燕君從小有天王受王君替代司命東嶽上真卿太元真人茅君大茅君諱盈字叔申左卿仙侯真君許君諱穆南嶽夫人弟子事晉為護軍長史退居句曲山侍帝晨青蓋真人郭君名世幹紫陽左真人周君義山清靈真人裴君漢右扶風人漢時得道靈飛太真太上大夫侍帝晨東華上佐司命楊君協晨大夫石叔門正一羽晨侯公楊子明玄洲主仙道君太上公子姓勤主關奏仙名經命仙伯太保真人八玄仙伯右仙公谷君正一左玄執蓋郎郤偉玄繡衣使者孟六竒太素宫官保禁仙郎裘文堅左楊王華仲戒繡衣使者西林藻右嬪之姬趙約羅三天左官直御史管長條逸域宫八景城七靈臺鳳臺瓊闕金晨華闕右位右聖金闕帝晨後聖玄元道君壬辰運當下生右輔侍帝晨領五嶽司命右弼桐柏真人金庭宫王君諱晉靈王太子下教右輔小有洞天太素清虛真人四司三元右保公王君諱褒魏夫人師下教矣侍帝晨右仙公許君長史子諱翽玄洲仙都太上丈人治玄洲紫桂宫玄洲之主矣太保玉郎李君名飛侍帝晨觀大夫九宫太傅玉晨郎北牖弟子中候仙人姓范諱遙字度世曾名永漢桓帝侍郎撰魏夫人傳女真位紫微元靈白玉龜臺九靈太真元君紫虛元君領上真司命南嶽魏夫人諱華存字賢安小有王君弟子楊君師八靈道母西嶽蔣夫人北海六微玄清夫人上真東宫䘙夫人北漢七靈石夫人紫清上宫九華真妃姓安晉朝降於茅山紫虛左宫郭夫人太極中華石夫人太真王夫人滄浪雲林右英王夫人朱陵北絶臺上嬪管妃方丈臺昭靈李夫人北嶽上真山夫人瓊華夫人三元馮夫人右華九成范夫人紫微左宫王夫人諱清娥字愈音阿母第二十六女也長陵杜夫人太微玄清左夫人右陽王華仲飛姬西華靈妃甄幽蕭後聖上保南極元君紫元夫人後聖上傅太素元君東華玉妃淳文期青童之妹東宫中候王夫人桐柏真人别生妹太和上真左夫人西漢夫人華山夫人玉清神女房素西王母侍女王上華董𩀱成石公子苑絶青地成君郭密香干若賔李方明張靈子太帝宫官靈林玉女賈屈庭金闕宫官太保侯范法安經命仙伯牙叔平東華宫玉女煙景珠上元夫人侍女宋辟非主仙道君侍女范運華趙峻珠王抱一華敬滌李伯益鮮于靈金太和殿寥陽殿蘂珠闕七映房長綿樓第三中位太極金闕帝君姓李壬辰下教太平主左位太極左真人中央黃老君太極左真人紫陽左仙公中華公子太極左卿黃觀子無上真人文始先生尹喜朱火丹靈宫龔仲陽幼陽兄弟二人受道於青童君東陽真人陵陽子明中元老人中央上玄子北極真人安期生北極老子玄上仙皇清和天帝君南極老人丹陵上真青精先生太宛北谷子玄和隂陵上帝太極髙仙伯延蓋公子玄洲仙伯太極左仙公葛玄吳時下演靈寶下為地仙西極老人素靈子期五老上真仙都老公撰靈書紫文東極老人扶陽公子太極左公北谷先生三天都護王長趙升太極上真公孔丘明晨侍郎三天司真顔回玄圃真人軒轅黃帝玄帝顓頊黃帝孫受靈寶五符王子帝嚳黃帝曽孫受靈寶五符帝舜服九轉神丹入於九疑山而得道矣柏成子髙蕩時退耕修步綱之道夏禹受鍾山真人靈寶九跡法治水有功周穆王至崑崙見西王母帝堯風后黃帝師出四扇者西歸子未顯蒲衣莊子云猶是被衣矣丰車子未顯支離被衣王倪齧缺巢父許由卞隨華封北人子州善卷馬皇安公姓陶乘赤龍矣大項名託右位太極右真人西梁子文太極右真人安度明玄洲仙都絳文期紫陽真人范明期鬱絶真人裴玄仁太玄仙女西靈子都司馬季主受西靈子都劒解之道太極仙侯張奉洞臺清虛七真人西嶽卿副司命季翼仲甫左元放師八老元仙正一上玄玉郎王中鮑丘南陵玉女陽谷真人領西歸傅淳于太玄戎山真人右仙公范泊華陸渾真人太極監西郭幼度中黃四司大夫領北海公涓子蘇君師矣太極法師徐來勒吳時天台山傳葛仙公法輪經邯鄲張君庚桑子蕭史太上玄一三真吳時降天台山傳葛仙公靈寶經劉京玄洲上卿太極中候大夫蘇君名林字子玄涓子弟子周君師弄玉二女白水使者長桑公子莊子師韋編郎莊周秦佚接輿伯昏郤間老聃第四中位太清太上老君為太清道主下臨萬民上皇太上無上大道君左位正一真人三天法師張諱道陵東華左仙卿白石生張叔茂元始天王西王母之師玄成青天上皇此三人太清尊位不領兆民南上大道君太上丈人天帝君九老仙都君九氣丈人此並太清三天東宫之真宫章奏關啓學道所得中嶽真人髙丘子景雲真人鬼谷先生泰清王九天郎吏北斗直符七人定氣真人監仙真人五仙夫人郭內夫人二十四官君將吏千二百官君將吏二條氣化結成趙伯玄劉子先臧延甫張子房寧仲君燕昭王茅初成少室山伯北臺郎千壽赤松子大梁真人魏顯仁華山仙伯秦叔隱葛衍真人周季通太和真人山世逺句曲真人定録右禁師茅君諱固字季偉為地真磻冡真人右禁郎王道寧太清右公李抱祖蓬萊左公宋晨生蓬萊右公賈保安潜山真伯趙祖陽九疑仙侯張上貴蓬萊左卿姜叔茂周大賔毛伯道劉道恭二人王屋山得道東方朔馬明生彭鏗西入流沙鳳綱韓終墨翟宋大水解樂子長李明雷平合丹商西四皓淮南八公青烏公黃山君寧封方明力牧昌宇莊伯微漢時人右位太清仙王趙車子太清仙王李元容小有仙王鄧離子五嶽司西門叔度中央真人宋德玄中嶽仙卿衍門子中嶽真人孟子卓西嶽真人馮延壽南嶽真人傅先生青城真人洪崖先生九疑真人韓偉逺岷山真人隂友宗司命太元定録紫臺四真人中嶽真人王仲甫北陵丈人太玄丈人北上丈人南上丈人太氣丈人益命丈人飛真丈人九道丈人示安丈人百福丈人百千神氣丈人登天上籙玉女四人上天玉女三人三天玉女百人青腰玉女官十人下等玉女北宫玉女五帝玉女太素玉女天素玉女白素玉女平天玉女六戊玉女青天益命玉女神丹玉女五流玉女右十五玉女號髙上將軍衡山使者上天力士天丁力士已上四人並有姓名各領天兵十萬號四將軍飛天使者九天使者九天真王使者髙仙啓天使者游天使者太清使者六乙使者六丙使者六丁使者六壬使者六癸使者右十五使者自然之神東方靈威仰南方赤熛弩西方曜魄寶北方隱侯局中央含樞紐此太清五帝自然之神五嶽君五百年而一替河侯河伯此三條是得道之人所補西嶽丈人三天玉童洛水神女此三條亦是學道人所補飛天丈人太一中黃玄上玉童猛獸先生此自然之神主天下鬼神禽獸趙升期在王屋山隂長生劉偉道漢時人郭崇子殷人郭聲子洛市中卜周君徐季道鵠鳴山鹿皮公仇季子司録君張巨君郭芍藥趙愛兒王魯連此三人女真救苦真人君軌司危司厄司命八威除福帛和華子期鮑察欒巴葛洪隱羅浮山左東無上王四天官王昌命天王佐命君王飛真虎王九都去死王四海隂王太一元君上虛君摩病上元君七星瑶光君三元萬福君夜光夫人和適夫人第五中位九官尚書姓張名奉字公先河內人先為河北司命禁保侯令為太極仙侯公領北職位在太極矣左位左相清虛真人從小有洞天王受王真人替已度上清左仙公郭四朝兼玉臺執蓋郎左仙公王遙甫赤君弟子齊獻公時人辛彥雲赤君弟子隨師下降散位未受其職朱陵嬪丁淑英管城子尹䖍子師蘇門先生周壽陵孟德然鄭景女師宋君李法成趙廣信師鄧元伯王玄甫霍山人尹䖍子華山張石生為東源伯李方回三人並晉時服未張禮正衡山漢末服黃精治明期衡山鄭景世廬江潜山右位右相已度上清右保召公奭從羅南明公受此位右保司展上公右真公郭少金協晨夫人黃景華黃瓊之女文德右仙監張叔隱真人禺君章散位張重華晉初服胡麻平仲卿括蒼山受𠎝境趙廣信魏末小白山虞公生海中狼山朱孺子赤水山黃盧子西嶽公姓葛禁氣召龍孫田廣一名登縻長生周大賓弟子許肇先在羅酆都為東明公右司晨許副字仲先修大洞真經第六中位右禁郎定録真君中茅君治華陽洞天左位三官保命小茅君三官大理都李豐三官大理守王附子荀中侯不顯名字白水仙都朱交甫北河司命保禁侯桃俊左理中監韓崇如大府長史左如司馬九宫協晨夫人文解地上主者鮑靚南海太守岱宗神侯領羅酆右禁司鮑元節地仙散位許虎牙名黟字丈暉受楊君守一之道王真上黨人也孟君京兆人也魯女生在中嶽此三人受行三一真一左元放李仲甫弟子在小括山九疑山女真羅郁今在湘東山杜陵夫人宜安宋姬此二人並受西梁真人青精方而不書位號未委何仙且在地真之列許邁字叔玄小名晄攺名逺逰東華署為地仙矣翁道逺姜伯真一云在猛山學道採藥二人映之儔侣郭聲子黃子陽一云魏夫人食桃皮師二人葛玄常相隨矣葛玄字孝先丹陽句曲人稚川之從祖也初在長山乘虎使鬼無處不至位在太極宫鄭思逺即葛玄弟子永昌元年入括蒼山戴孟本姓燕名濟字仲微裴君弟子謝允歷陽人戴孟弟子成帝時得道施存一號婉盆子孔子弟子三千人數得道劉奉林周時人服黃連張兆期費長房之師周君二人俱讀素書七卷得道雷氏周氏養龍姜叔田公劉安之裴君時冀州别駕赤魯班即黃初起也范安逺賈玄道李叔勝言成生傅道流四人並𨽻司命主察試學道者在太山真人樊子明龍威丈人劉少翁華山梁伯鸞樊大夫吳睦長安人少為縣吏朱㹠陳留人昔作劫盜郭端潁川人少孤為縣吏范伯慈桂陽人少曽邪病鮑叔陽王養伯段季正劉偉惠四人師西靈子都宋玄德嵩髙山李東童初府蕭間宫並男真易遷宫八十三人含真臺僅二百人並女真右位右理中監劉翊典柄執法郎淳于斟理禁張玄賔王雨水之官亦保命書童初府師上侯劉寬即保命府丞四人趙威伯主仙籍并暴雨水樂長治主災害鄭稚政主考注唐公房主其死生明晨侍郎七人比御史中丞三男真夏馥字子恬陳留人桐柏真人