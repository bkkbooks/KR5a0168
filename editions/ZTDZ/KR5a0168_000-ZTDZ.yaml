front:
  text: 洞玄靈寳眞靈位業圖序騰四夫仰鏡玄精覩景耀之巨細俯眄平區見巖海之崇深搜訪人綱究朝班之品序研綜天經測眞靈之階業但名爵隱顯學號進退四宮之內疑似相㕘今正當比類經正讎校儀服埒其高卑區其宮域又有指目單位上皇道君五帝七老如此比之類是矣略說姓名墨羽孟卓之例是或任同秩異金闕四帝太極四眞及下教之例是矣業均迹別者諸步綱之例也如希林眞人爲太微右公而領九宮上相末委爲北宴上清當下親相識耶諸如此例難可必證謂其並繼其所領而從高域粗事事條辯略宣後章輒以淺識下生輕品上聖升降失序梯級乖本懼貽謫玄府絡咎冥司謹依誠陳啓仰希照亮若必不宜然願垂戒告今所詮貫者實稟注之奧旨存向之要趣祈祝跪請宜委位序之尊卑對眞接異必究所遇之輕重是以三君共辭先致學未體之尤下班居上智有不達之蔽雖同號眞人眞品乃有數俱目仙人仙亦有等級千億若不精委條領略識宗源者猶如野夫出朝廷見朱衣必令史句驪入中國呼一切爲㕘軍豈解士庶之貴賤辯爵號異同乎陶弘景序洞玄靈寳眞靈位業圖
