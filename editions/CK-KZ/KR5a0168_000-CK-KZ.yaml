body:
  text: 洞玄靈寶眞靈位業圖梁貞白先生陶弘景纂唐天臺妙有大師玄同先生賜紫閭邱方遠校定玉清三元宮上第一中位上合虛皇道君應號元始天尊左位五靈七明混生高上道君東明高上虛皇道君西華高上虛皇道君北玄高上虛皇道君南朱高上虛皇道君玉清上元宮四道君各有諱字玉清中元宮紫清六道君各有諱字玉清下元宮高清四元君各有諱字玉清中散位一十君諱字不顯右位紫虛高上元皇道君洞虛三元太明上皇道君太素高虛上極紫皇道君虛明紫蘭中元高上嵉皇道君三元上玄老虛皇元晨君三元四極上元虛皇元靈君三元晨中黃景虛皇元臺君三元紫映揮神虛生主眞元胎君玉玄太皇君上皇道君玉皇道君清玄道君上皇天帝玉天太一君太上虛皇道君太上玉眞保皇道君玄皇高眞太一玉君高上玉帝右玉清境元始天尊爲主已下道君皆得策命學道號令羣眞太微天帝來受事並不與下界相關自九宮已上上清已下高眞仙官皆得朝宴焉第二中位上清高聖太上玉晨玄皇大道君爲萬道之主左位左聖紫晨太微天帝道君左聖南極南嶽眞人左仙公太虛眞人赤松子黃老君弟子裴君師左輔後聖上宰西域西極眞人總眞君姓王諱遠字方平紫陽君弟子司命茅君師紫清太素高虛洞曜道君太虛上霄飛晨中央道君太微東霞扶桑丹林大帝上道君後聖太師太微左眞保皇道君紫明太微九道高元玉晨道君紫元太微八素三元玄晨道君九微太眞玉保王金闕上相大司命高晨師東海王青華小童君領九宮上相長里先生薛君周時得道許長史前緣兄也太微右眞公領九宮上相希林眞人燕君從小有天王受王君替代司命東嶽上眞卿太元眞人茅君大茅君諱盈字叔申左卿仙侯眞君許君諱穆南嶽夫人弟子事晉爲護軍長史退居句曲山侍帝晨青蓋眞人郭君名世幹紫陽左眞人周君義山清靈眞人裴君漢右扶風人漢時得道靈飛太眞太上大夫侍帝晨東華上佐司命楊君協晨大夫石叔門正一羽晨侯公楊子明玄洲主仙道君太上公子姓勤主關奏仙名經命仙伯太保眞人八玄仙伯右仙公谷君正一左玄執蓋郎郄偉玄繡衣使者孟六奇太素宮官保禁仙郎裘文堅左楊王華仲戒繡衣使者西林藻右嬪之姬趙約羅三天左官直御史管長條逸域宮八景城七靈臺鳳臺瓊闕金晨華闕右位右聖金闕帝晨後聖玄元道君壬辰運當下生右輔侍帝晨領五嶽司命右弼桐栢眞人金庭宮王君諱晉靈王太子下教右輔小有洞天太素清虛眞人四司三元右保公王君諱褒魏夫人師下教矣侍帝晨右仙公許君長史子諱翽玄洲仙都太上丈人治玄洲紫桂宮玄洲之主矣太保玉郎李君名飛侍帝晨觀大夫九宮太傅玉晨郎北牖弟子中候仙人姓范諱遙字度世曾名永漢桓帝侍郎撰魏夫人傳女眞位紫微元靈白玉龜臺九靈太眞元君紫虛元君領上眞司命南嶽魏夫人諱華存字賢安小有王君弟子楊君師八靈道母西嶽蔣夫人北海六微玄清夫人上眞東宮䘙夫人北漢七靈石夫人紫清上宮九華眞妃姓安晉朝降於茅山紫虛左宮郭夫人太極中華石夫人太眞王夫人滄浪雲林右英王夫人朱陵北絶臺上嬪管妃方丈臺昭靈李夫人北嶽上眞山夫人瓊華夫人三元馮夫人右華九成范夫人紫微左宮王夫人諱清娥字愈音阿母第二十六女也長陵杜夫人太微玄清左夫人右陽王華仲飛姬西華靈妃甄幽蕭後聖上保南極元君紫元夫人後聖上傅太素元君東華玉妃淳文期青童之妹東宮中候王夫人桐柏眞人别生妹太和上眞左夫人西漢夫人華山夫人玉清神女房素西王母侍女王上華董雙成石公子苑絶青地成君郭密香干若賓李方明張靈子太帝宮官靈林玉女賈屈庭金闕宮官太保侯范法安經命仙伯牙叔平東華宮玉女煙景珠上元夫人侍女宋辟非主仙道君侍女范運華趙峻珠王抱一華敬滌李伯益鮮于靈金太和殿寥陽殿蘂珠闕七映房長綿樓第三中位太極金闕帝君姓李壬辰下教太平主左位太極左眞人中央黃老君太極左眞人紫陽左仙公中華公子太極左卿黃觀子無上眞人文始先生尹喜朱火丹靈宮龔仲陽幼陽兄弟二人受道於青童君東陽眞人陵陽子明中元老人中央上玄子北極眞人安期生北極老子玄上仙皇清和天帝君南極老人丹陵上眞青精先生太宛北谷子玄和陰陵上帝太極高仙伯延蓋公子玄洲仙伯太極左仙公葛玄吳時下演靈寶下爲地仙西極老人素靈子期五老上眞仙都老公撰靈書紫文東極老人扶陽公子太極左公北谷先生三天都護王長趙昇太極上眞公孔邱明晨侍郎三天司眞顏囘玄圃眞人軒轅黃帝玄帝顓頊黃帝孫受靈寶五符王子帝嚳黃帝曾孫受靈寶五符帝舜服九轉神丹入於九疑山而得道矣栢成子高湯時退耕修步綱之道夏禹受鍾山眞人靈寶九跡法治水有功周穆王至崑崙見西王母帝堯風后黃帝師出四扇者西歸子未顯蒲衣莊子云猶是被衣矣丰車子未顯支離被衣王倪齧缺巢父許由卞隨華封北人子州善卷馬皇安公姓陶乘赤龍矣大項名託右位太極右眞人西梁子文太極右眞人安度明玄洲仙都絳文期紫陽眞人范明期鬱絶眞人裴玄仁太玄仙女西靈子都司馬季主受西靈子都劍解之道太極仙侯張奉洞臺清虛七眞人西嶽卿副司命季翼仲甫左元放師八老元仙正一上玄玉郎王中鮑邱南陵玉女陽谷眞人領西歸傅淳于太玄戎山眞人右仙公范泊華陸渾眞人太極監西郭幼度中黃四司大夫領北海公涓子蘇君師矣太極法師徐來勒呉時天台山傳葛仙公法輪經邯鄲張君庚桑子蕭史太上玄一三眞呉時降天台山傳葛仙公靈寶經劉京玄洲上卿太極中候大夫蘇君名林字子玄涓子弟子周君師弄玉二女白水使者長桑公子莊子師韋編郎莊周秦佚接輿伯昏郄間老聃第四中位太清太上老君爲太清道主下臨萬民上皇太上無上大道君左位正一眞人三天法師張諱道陵東華左仙卿白石生張叔茂元始天王西王母之師玄成青天上皇此三人太清尊位不領兆民南上大道君太上丈人天帝君九老仙都君九氣丈人此並太清三天東宮之眞官章奏關啟學道所得中嶽眞人高丘子景雲眞人鬼谷先生泰清王九天郎吏北斗直符七人定氣眞人監仙眞人五仙夫人郭內夫人二十四官君將吏千二百官君將吏二條氣化結成趙伯玄劉子先臧延甫張子房甯仲君燕昭王茅初成少室山伯北臺郎千壽赤松子大梁眞人魏顯仁華山仙伯秦叔隱葛衍眞人周季通太和眞人山世遠句曲眞人定錄右禁師茅君諱固字季偉爲地眞磻冡眞人右禁郎王道甯太清右公李抱祖蓬萊左公宋晨生蓬萊右公賈保安潜山眞伯趙祖陽九疑仙侯張上貴蓬萊左卿姜叔茂周大賓毛伯道劉道恭二人王屋山得道東方朔馬明生彭鏗西入流沙鳳綱韓終墨翟宋大水解樂子長李明雷平合丹商西四皓淮南八公青烏公黃山君甯封方明力牧昌宇莊伯微漢時人右位太清仙王趙車子太清仙王李元容小有仙王鄧離子五嶽司西門叔度中央眞人宋德玄中嶽仙卿衍門子中嶽眞人孟子卓西嶽眞人馮延壽南嶽眞人傅先生青城眞人洪崖先生九疑眞人韓偉遠岷山眞人陰友宗司命太元定錄紫臺四眞人中嶽眞人王仲甫北陵丈人太玄丈人北上丈人南上丈人太氣丈人益命丈人飛眞丈人九道丈人示安丈人百福丈人百千神氣丈人登天上籙玉女四人上天玉女三人三天玉女百人青腰玉女官十人下等玉女北宮玉女五帝玉女太素玉女天素玉女白素玉女平天玉女六戊玉女青天益命玉女神丹玉女五流玉女右十五玉女號高上將軍衡山使者上天力士天丁力士已上四人並有姓名各領天兵十萬號四將軍飛天使者九天使者九天眞王使者高仙啟天使者游天使者太清使者六乙使者六丙使者六丁使者六壬使者六癸使者右十五使者自然之神東方靈威仰南方赤熛弩西方曜魄寶北方隱侯局中央含樞紐此太清五帝自然之神五嶽君五百年而一替河侯河伯此三條是得道之人所補西嶽丈人三天玉童洛水神女此三條亦是學道人所補飛天丈人太一中黃玄上玉童猛獸先生此自然之神主天下鬼神禽獸趙昇期在王屋山陰長生劉偉道漢時人郭崇子殷人郭聲子洛市中卜周君徐季道鵠鳴山鹿皮公仇季子司錄君張巨君郭芍藥趙愛兒王魯連此三人女眞救苦眞人君軌司危司厄司命八威除福帛和華子期鮑察欒巴葛洪隱羅浮山左東无上王四天官王昌命天王佐命君王飛眞虎王九都去死王四海陰王太一元君上虛君摩病上元君七星瑶光君三元萬福君夜光夫人和適夫人第五中位九官尚書姓張名奉字公先河內人先爲河北司命禁保侯今爲太極仙侯公領北軄位在太極矣左位左相清虛眞人從小有洞天王受王眞人替已度上清左仙公郭四朝兼玉臺執蓋郎左仙公王遥甫赤君弟子齊獻公時人辛彥雲赤君弟子隨師下降散位未受其職朱陵嬪丁淑英管城子尹䖍子師蘇門先生周壽陵孟德然鄭景女師宋君李法成趙廣信師鄧元伯王玄甫霍山人尹䖍子華山張石生爲東源伯李方回三人並晉時服朮張禮正衡山漢末服黃精治明期衡山鄭景世廬江潜山右位右相已度上清右保召公奭從羅南明公受此位右保司展上公右眞公郭少金協晨夫人黃景華黃瓊之女文德右仙監張叔隱眞人禺君章散位張重華晉初服胡麻平仲卿括蒼山受𠎝境趙廣信魏末小白山虞公生海中狼山朱孺子赤水山黃盧子西嶽公姓葛禁氣召龍孫田廣一名登縻長生周大賓弟子許肇先在羅酆都爲職東明公右司晨許副字仲先修大洞眞經第六中位右禁郎定錄眞君中茅君治華陽洞天左位三官保命小茅君三官大理都李豐三官大理守王附子荀中侯不顯名字白水仙都朱交甫北河司命保禁侯桃俊左理中監韓崇如大府長史左如司馬九宮協晨夫人文解地上主者鮑靚南海太守岱宗神侯領羅酆右禁司鮑元節地仙散位許虎牙名黟字文暉受楊君守一之道王眞上黨人也孟君京兆人也魯女生在中嶽此三人受行三一眞一左元放李仲甫弟子在小括山九疑山女眞羅郁今在湘東山杜陵夫人宜安宋姬此二人並受西梁眞人青精方而不書位號未委何仙且在地眞之列許邁字叔玄小名映改名遠逰東華署爲地仙矣翁道遠姜伯眞一云在猛山學道採藥二人映之儔侣郭聲子黃子陽一云魏夫人食桃皮師二人葛玄常相隨矣葛玄字孝先丹陽句曲人稚川之從祖也初在長山乘虎使鬼無處不至位在太極宮鄭思遠即葛玄弟子晉永昌元年入括蒼山戴孟本姓燕名濟字仲微裴君弟子謝允厯陽人戴孟弟子晉成帝時得道施存一號婉盆子孔子弟子在三千人數得道劉奉林周時人服黃連張兆期費長房之師周君二人俱讀素書七卷得道雷氏周氏養龍姜叔田公劉安之裴君時冀州别駕赤魯班卽黃初起也范安遠賈玄道李叔勝言成生傅道流四人並隸司命主察試學道者在太山眞人樊子明龍威丈人劉少翁華山梁伯鸞樊大夫呉睦長安人少爲縣吏朱㹠陳留人昔作劫盜郭端潁川人少孤爲縣吏范伯慈桂陽人少曾邪病鮑叔陽王養伯段季正劉偉惠四人師西靈子都宋玄德嵩高山李東童初府蕭閑宮並男眞易遷宮八十三人含眞臺僅二百人並女眞右位右理中監劉翊典柄執法郎淳于斟理禁張玄賓主雨水之官亦保命書童初府師上侯劉寛即保命府丞四人趙威伯主仙籍並暴雨水樂長治主災害鄭稚政主考注唐公房主其死生明晨侍郎七人比御史中丞三男眞夏馥字子恬陳留人桐栢眞人弟子二人不顯四女眞周夏友汝南安城人河南尹用暢之女張桃枝沛人司隸朱寓之母二人不顯監二人范幽仲遼西人漢尚書郎李整河內人武解鬼帥者王延范糧傅晃除銜四人已度地仙散位中嶽仙人宋來子先爲楚市長遇馮延壽中嶽李先生扁鵲弟子五人子容子明子威子戲子游趙太子服朮者將先生支子元之師支子元作裴君小時師廬生侯公石生入東海爲始皇使林屋仙人王偉玄山圖公子周哀王時大夫張禁保之師赤須子夏明晨之師青谷先生劉上緼之師惠車子淳于典柄之師石長生周明晨之師東郭幼平桃北河之師鄭子眞陽翟山鄧雲山唐覽華山西河薊公張理禁之師周正時刁道林龍伯高之師郭子華趙叔逵張季連三人在霍山趙公成鶴鳴山范丘林女眞趙威伯六甲之師修羊公化爲白石矣稷丘子崔文子商邱子服菖蒲而不老劉根服甘草介象白羊公不顯姓名介琰白羊弟子劉綱妻嚴青並善禁氣已上六人善禁劾陳仲林道君趙叔道三人蓋竹山中眞人王世龍許遠遊師趙道玄傅太初遠遊之交龔幼節李開林遠遊代對者王少道范叔勝李伯山三人童初府標表李仲文傅知禮女眞竇瓊英韓太華安國妹李廣利婦劉春龍李奚子王進賢衍女郭叔香趙素臺熙女鄭天生鄧艾母許科斗長史婦李惠姑夏侯玄婦張美子施淑女續女宋漂金母鮑靚妹張微子傅和二人含眞臺主山外其東者杜契徐宗度晏賢生二人契友孫寒華女眞陳世景二人契弟子趙熙方山下洞室主者張祖常劉平阿呂子華蔡天生龍伯高五人並處方臺謝稚堅王伯遼繁陽子何苖馮良郎宗五人在鹿跡洞王叔明鮑元治尹蓋婦三人之外餘三十人並北山下絶洞辛玄子自云禁无中郎將吳越鬼神之司比干在戎山李喜南陽人務光第七中位酆都北陰大帝炎帝大庭氏諱慶甲天下鬼神之宗治羅酆山三千年而一替左位北帝上相秦始皇北帝太傅魏武帝五帝上相西明公領北帝師周文王比少傅賓友晉宣帝中護軍周顗東明公領斗君師夏啟賓友孫策右師晨如世中書監許肇已度九宮位矣南明公召奭一云東明公已度九宮右保公賓友漢高祖北明公呉季札呉王壽夢之子闔閭之叔延陵季子賓友荀彧字文若魏武謀臣漢尚書令趙叔臺王世卿未顯此四明主領四方各治一天宮在職一千六百年得補仙官其餘職不得矣鬼官北斗君周武王治一天宮三官都禁郎齊桓公姓姜名小白水官司命晉文公姓姬名重耳大禁晨二人位比尚書令漢光武帝孫文臺名堅中禁二人位比中書令監顏懷字思季楊彪字文光北帝南朱陽大門靈關侯郄鑒先是高明司直郄鑒今爲之位比尚書僕射右禁監謝幼輿名鯤晉官太常司馬鄧嶽右禁監侍帝晨庾元規名亮晉時位比侍中領右衞又云元規前爲中衞大將軍司馬馮懷字相思晉太常華歆長史虞翻字長翔武昌人庾亮江州引爲上佐不就後中衞大將軍孔文舉名融長史唐周爲呉尚書司馬張繡後漢將軍監海伯治東海温太眞位比大將軍長史杜預晉征南將軍位左傅北帝侍晨八人位比侍中徐庶字文直龐德字今明爰榆字世都李廣漢將王嘉解結字叔連何晏字平叔殷浩字淵源四明公北斗君各有侍帝晨五人未顯姓名河北侯二人劉備字玄德韓遂右此職統屬仙官右位中廐直事四人如世尚書戴淵字若思晉驃騎公孫度字叔濟王遼東郭嘉劉封備養子北帝南門亭長二人郄鑒周撫字道和代郄鑒北天脩門郎二人虞諱紀瞻脩門郎八人北斗君門亦有此職姓名並未顯北斗君天門亭長二人臧洪字子源王放晉中書郎期門郎王允之王敦堂弟謝鳳典柄侯范明周魴字子魚主察試北帝執蓋郎顧和字君孝晉吏部尚書部鬼將軍王廙字世將晉時荆州刺史殺鬼地映日遊三鬼北帝常使殺人無姓名西門郎十六人未顯主天下房廟血食之鬼亦應隸四明公主非使者嚴白虎呉時人爲孫䇿所殺南彈方侯許副領威南兵千人已度九宮未委誰代主南門鑰司馬留贊長山人爲呉將北彈方侯鮑勛領威北兵千人字叔業魏中丞主北門鑰司馬韋遵呉時衆孫備門主收執如世羽林監西河侯陶侃字士行亦領兵數千長史先用徐甯被彈今用蔡謨字道明晉司徒廬山侯魏釗會稽人也南山伯蔣濟字子通魏太尉此三任各有封掌泰山君荀顗字景倩將軍顧衆字長始晉丹陽尹僕射長史桓範字元則司馬曹洪魏武帝操弟字子廉又云先用賈誼前漢人盧龍公曹仁字子孝魏武帝弟位大將軍長史司馬未顯南巴侯何曾字穎孝魏司徒東越大將軍劉陶字子寄後魏人右號爲四鎭各領鬼兵萬人各有長馬復有小鎭數百各領鬼兵數千人楚嚴公即楚莊王熊鬻趙簡子此二人先未有職今方受位項梁成作酆都宮頌者杜瓊蜀人馬融劉慶孫與賈誼爭名譽王逸少鄧攸此六人位未顯右鬼官見有七十五職名顯者凡一百一十九人
